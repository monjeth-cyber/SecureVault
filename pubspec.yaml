name: secure_vault
description: A secure identity system using Flutter with MVVM architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management (MVVM ViewModel)
  provider: ^6.1.2

  # Firebase Authentication (email/password + Google Sign-In)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Biometric authentication
  local_auth: ^2.3.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
